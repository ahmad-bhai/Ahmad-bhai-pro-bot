<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot</title>
</head>
<body>
    <script id="js">
    (function() {
    // Force show on run
    localStorage.setItem('ahmad_bot_visible', 'true');

    /* ------------------ 1. CONFIG & UID ------------------ */
    const projectID = "reactions-maker-site";
    const dbURL = `https://${projectID}-default-rtdb.firebaseio.com/users.json`;
    const storageKey = 'AHMAD_BHAI_PRO_BOT';

    let myUID = localStorage.getItem(storageKey);
    if (!myUID) {
        myUID = "";
        for (let i = 0; i < 20; i++) myUID += Math.floor(Math.random() * 10);
        localStorage.setItem(storageKey, myUID);
    }

    /* ------------------ 2. STYLING (Safe & Fixed) ------------------ */
    const existing = document.getElementById('ahmad-bot');
    if (existing) existing.remove();

    const style = document.createElement('style');
    style.innerHTML = `
        #ahmad-bot {
            position: fixed; top: 0; left: 0; width: 260px;
            background: #0a0a0a; border: 2.5px solid #722082;
            border-radius: 20px; padding: 18px; z-index: 2147483647;
            color: white; font-family: sans-serif;
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            user-select: none; touch-action: none; transform-origin: top left;
            visibility: visible !important; display: block !important;
        }
        .drag-handle {
            width: 100%; cursor: move; padding: 12px 0; border-bottom: 1px solid #333;
            margin-bottom: 12px; background: #1a1a1a; border-radius: 15px 15px 0 0;
        }
        .bot-title { color: #722082; font-weight: 800; font-size: 17px; }
        .close-btn { position: absolute; right: 15px; top: 15px; cursor: pointer; color: #ff3131; font-weight: bold; font-size: 20px; }
        #ui-msg { font-size: 11px; margin-bottom: 10px; min-height: 15px; font-weight: bold; }
        .msg-error { color: #ff3131; } .msg-success { color: #00ff00; }
        .id-container { background: #151515; border: 1px dashed #722082; padding: 10px; border-radius: 12px; margin: 10px 0; font-size: 11px; word-break: break-all; }
        .pro-btn { width: 100%; padding: 12px; border-radius: 12px; background: #722082; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .bot-select { width: 100%; background: #1a1a1a; color: white; border: 1px solid #333; padding: 10px; border-radius: 10px; margin-bottom: 5px; outline: none; }
        #signal-display { font-size: 26px; font-weight: bold; margin: 15px 0; min-height: 38px; cursor: pointer; }
        #countdown-display { font-size: 20px; color: #ffae00; font-weight: bold; visibility: hidden; }
        .indicator { display: flex; align-items: center; justify-content: center; font-size: 10px; color: #aaa; margin-top: 10px; }
        #status-dot { width: 9px; height: 9px; background: #ff0000; border-radius: 50%; margin-right: 8px; }
    `;
    document.head.appendChild(style);

    /* ------------------ 3. HTML DOM ------------------ */
    const bot = document.createElement('div');
    bot.id = 'ahmad-bot';
    bot.innerHTML = `
        <div class="close-btn" id="full-exit">×</div>
        <div class="drag-handle" id="bot-header"><div class="bot-title">AHMAD BHAI PRO</div></div>
        <div id="ui-msg">READY</div>
        
        <div id="view-lock">
            <div class="id-container">ID: <span id="uid-val">${myUID}</span></div>
            <button class="pro-btn" style="background:#222; font-size:10px;" id="copy-btn">COPY ID</button>
            <button class="pro-btn" id="verify-btn">VERIFY ACCESS</button>
        </div>

        <div id="view-bot" style="display:none;">
            <select id="pair-select" class="bot-select">
                <option>USD/PKR (OTC)</option><option>USD/INR (OTC)</option><option>USD/ARS (OTC)</option>
                <option>USD/BRL (OTC)</option><option>NZD/CAD (OTC)</option><option>USD/IDR (OTC)</option>
                <option>USD/BDT (OTC)</option><option>USD/EGP (OTC)</option><option>USD/MXN (OTC)</option><option>AUD/NZD (OTC)</option>
            </select>
            <select id="time-select" class="bot-select">
                <option value="5">5s</option><option value="10">10s</option><option value="15">15s</option>
                <option value="30">30s</option><option value="60">1m</option><option value="120">2m</option>
                <option value="300">5m</option><option value="600">10m</option><option value="900">15m</option><option value="1800">30m</option>
            </select>
            <div id="signal-display">READY</div>
            <div id="countdown-display">00s</div>
            <button id="start-btn" class="pro-btn">GET SIGNAL</button>
            <div class="indicator"><div id="status-dot"></div> <span id="status-text">WAITING...</span></div>
        </div>
    `;
    document.body.appendChild(bot);

    /* ------------------ 4. LOGIC (FIXED DRAG & SYNC) ------------------ */
    const msg = document.getElementById('ui-msg');
    let x = parseInt(localStorage.getItem('bot_x')) || 80;
    let y = parseInt(localStorage.getItem('bot_y')) || 80;
    let scale = parseFloat(localStorage.getItem('bot_scale')) || 1.0;

    const updateState = () => {
        bot.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
        localStorage.setItem('bot_x', x);
        localStorage.setItem('bot_y', y);
        localStorage.setItem('bot_scale', scale);
    };
    updateState();

    document.getElementById('full-exit').onclick = () => bot.remove();
    document.getElementById('copy-btn').onclick = () => {
        navigator.clipboard.writeText(myUID);
        msg.innerText = "COPIED!"; msg.className = "msg-success";
    };

    // Firebase Scan
    document.getElementById('verify-btn').onclick = async function() {
        this.innerText = "VERIFYING...";
        try {
            const res = await fetch(dbURL);
            const data = await res.json();
            let user = Object.values(data || {}).find(u => u.id === myUID);

            if (user && user.status === "active") {
                document.getElementById('view-lock').style.display = "none";
                document.getElementById('view-bot').style.display = "block";
                msg.innerText = "ACCESS GRANTED"; msg.className = "msg-success";
            } else {
                msg.innerText = "ID NOT ACTIVE"; msg.className = "msg-error";
                this.innerText = "VERIFY ACCESS";
            }
        } catch (e) {
            msg.innerText = "DATABASE ERROR";
            this.innerText = "VERIFY ACCESS";
        }
    };

    // Trade Signal Logic
    const startBtn = document.getElementById('start-btn');
    startBtn.onclick = () => {
        startBtn.disabled = true;
        const sig = document.getElementById('signal-display');
        const countD = document.getElementById('countdown-display');
        const dot = document.getElementById('status-dot');
        sig.innerText = "ANALYZING...";
        setTimeout(() => {
            const up = Math.random() > 0.5;
            sig.innerText = up ? "CALL UP ↑" : "PUT DOWN ↓";
            sig.style.color = up ? "#00ff00" : "#ff3131";
            dot.style.background = "#00ff00";
            countD.style.visibility = "visible";
            let timeLeft = parseInt(document.getElementById('time-select').value);
            const timer = setInterval(() => {
                countD.innerText = timeLeft-- + "s";
                if (timeLeft < 0) {
                    clearInterval(timer);
                    sig.innerText = "READY"; sig.style.color = "white";
                    countD.style.visibility = "hidden";
                    dot.style.background = "#ff0000";
                    startBtn.disabled = false;
                }
            }, 1000);
        }, 1500);
    };

    /* --- ULTIMATE DRAG LOGIC --- */
    let isDragging = false;
    let startX, startY;
    const header = document.getElementById('bot-header');

    const dragStart = (e) => {
        isDragging = true;
        const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
        startX = clientX - x;
        startY = clientY - y;
        bot.style.transition = "none"; // Dragging ke waqt transition band
    };

    const dragging = (e) => {
        if (!isDragging) return;
        const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
        x = clientX - startX;
        y = clientY - startY;
        updateState();
    };

    const dragEnd = () => {
        isDragging = false;
        bot.style.transition = "transform 0.1s ease-out";
    };

    header.addEventListener("mousedown", dragStart);
    window.addEventListener("mousemove", dragging);
    window.addEventListener("mouseup", dragEnd);

    header.addEventListener("touchstart", dragStart, {passive: false});
    window.addEventListener("touchmove", dragging, {passive: false});
    window.addEventListener("touchend", dragEnd);

    // Double Click to Scale
    header.ondblclick = () => { scale -= 0.05; updateState(); };
    document.getElementById('signal-display').ondblclick = () => { scale += 0.05; updateState(); };

})();

</script>
</body>
    </html>
